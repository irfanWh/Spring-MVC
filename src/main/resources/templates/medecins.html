<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Medecins</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Medecin List</h5>
            <a th:href="@{/admin/formMedecins}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle"></i> New Medecin
            </a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Specialite</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${listMedecins}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.name}"></td>
                    <td th:text="${m.email}"></td>
                    <td th:text="${m.specialite}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/admin/editMedecin(id=${m.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a onclick="return confirm('Are you sure?')"
                           th:href="@{/admin/deleteMedecin(id=${m.id}, page=${currentPage})}"
                           class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
            <nav th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li th:each="page, status : ${pages}" class="page-item"
                        th:classappend="${status.index == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/user/medecins(page=${status.index})}"
                           th:text="${status.index + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</section>
</body>
</html>
