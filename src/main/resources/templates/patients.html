<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Patients</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Patient List</h5>
            <a th:href="@{/admin/formPatients}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle"></i> New Patient
            </a>
        </div>
        <div class="card-body">
            <form method="get" th:action="@{/user/patients}" class="mb-3">
                <div class="input-group">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by name...">
                    <button type="submit" class="btn btn-outline-primary">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </form>
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Date Naissance</th>
                    <th>Malade</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${listPatients}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${#dates.format(p.dateNaissance, 'yyyy-MM-dd')}"></td>
                    <td>
                        <span th:if="${p.malade}" class="badge bg-danger">Yes</span>
                        <span th:unless="${p.malade}" class="badge bg-success">No</span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/admin/editPatient(id=${p.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a onclick="return confirm('Are you sure?')"
                           th:href="@{/admin/deletePatient(id=${p.id}, page=${currentPage}, keyword=${keyword})}"
                           class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
            <nav th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li th:each="page, status : ${pages}" class="page-item"
                        th:classappend="${status.index == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/user/patients(page=${status.index}, keyword=${keyword})}"
                           th:text="${status.index + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</section>
</body>
</html>
