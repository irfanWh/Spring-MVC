<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Patient Form</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0" th:text="${patient.id != null} ? 'Edit Patient' : 'New Patient'">Patient Form</h5>
        </div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/savePatient}" th:object="${patient}">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date de Naissance</label>
                    <input type="date" class="form-control" th:field="*{dateNaissance}">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{malade}">
                    <label class="form-check-label">Malade</label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a th:href="@{/user/patients}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancel
                </a>
            </form>
        </div>
    </div>
</section>
</body>
</html>
